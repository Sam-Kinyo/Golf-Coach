<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>開啟學員專區</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f8fb;
      color: #1f2d3d;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      box-sizing: border-box;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      padding: 20px 18px;
      text-align: center;
    }
    h1 { font-size: 18px; margin: 0 0 10px 0; }
    p { margin: 0; color: #667; line-height: 1.5; }
    .btn {
      display: inline-block;
      margin-top: 14px;
      background: #06c755;
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>正在開啟學員專區</h1>
    <p>若未自動開啟，請點下方按鈕。</p>
    <a id="openBtn" class="btn" href="#">點我開啟學員專區</a>
  </div>
  <script>
    (function () {
      var liffId = '2009368868-p390tnyT';
      var target = 'https://golf-coach-aebcd.web.app/student/index.html?from=relay&cv=' + Date.now();
      var candidates = [
        'line://app/' + liffId,
        'https://liff.line.me/' + liffId,
        target
      ];
      var btn = document.getElementById('openBtn');
      btn.href = candidates[1];
      var i = 0;
      function goNext() {
        if (i >= candidates.length) return;
        window.location.replace(candidates[i]);
        i += 1;
      }
      goNext();
      setTimeout(goNext, 700);
      setTimeout(goNext, 1400);
    })();
  </script>
</body>
</html>
